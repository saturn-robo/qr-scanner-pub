<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер штрихкодов</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { margin: 0 0 1rem; font-size: 1.5rem; text-align: center; }
        
        #qr-result { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: #fafafa; }
        #qr-result:focus { outline: none; border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        button { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #btn-upload { background: #8b5cf6; }
        #btn-clear { background: #64748b; display: none; } /* Скрыта по умолчанию */
        
        #reader { width: 100%; min-height: 200px; background: #f1f5f9; border-radius: 8px; overflow: hidden; position: relative; }
        #reader video, #reader img, #reader canvas { width: 100% !important; height: auto !important; display: block; object-fit: contain; }
        
        /* 🔥 Жёстко скрываем все элементы интерфейса библиотеки (чёрный круг, прицел, кнопки) */
        #reader div, #reader svg, #reader img[src^="data:"], #reader .scan-region-highlight { display: none !important; }
        #reader > canvas { display: block !important; } /* Оставляем только canvas для декодирования */
        
        #status { margin-top: 0.75rem; text-align: center; color: #64748b; font-size: 0.9rem; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Сканер</h1>
        <input type="text" id="qr-result" placeholder="Результат..." autocomplete="off" readonly>
        
        <div class="btn-group">
            <button id="btn-start">Включить камеру</button>
            <button id="btn-upload">📁 Загрузить фото</button>
            <button id="btn-clear">✕ Очистить</button>
        </div>
        
        <input type="file" id="file-input" accept="image/*">
        <div id="reader"></div>
        <div id="status">Нажмите кнопку для запуска</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script>
        const resultInput = document.getElementById('qr-result');
        const btnStart = document.getElementById('btn-start');
        const btnUpload = document.getElementById('btn-upload');
        const btnClear = document.getElementById('btn-clear');
        const fileInput = document.getElementById('file-input');
        const statusEl = document.getElementById('status');
        const readerDiv = document.getElementById('reader');

        let html5QrCode = null;
        let cameraRunning = false;

        // Поддерживаемые форматы (QR + основные 1D штрихкоды документов)
        const FORMATS = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39
        ];

        // === КАМЕРА ===
        btnStart.addEventListener('click', async () => {
            if (cameraRunning) return; // Кнопка "остановить" убрана по запросу
            
            try {
                statusEl.textContent = 'Запрос камеры...';
                btnStart.disabled = true;
                btnUpload.disabled = true;
                await cleanup();

                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    () => {} // Ошибки игнорируем (каждый кадр без кода)
                );
                cameraRunning = true;
                btnStart.style.background = '#22c55e';
                btnStart.textContent = 'Камера работает';
                statusEl.textContent = 'Наведите на штрихкод';
                
            } catch (err) {
                statusEl.textContent = '❌ Камера недоступна: ' + err.message;
                btnStart.disabled = false;
            }
        });

        // === ЗАГРУЗКА ФОТО (Оптимизировано для документов) ===
        btnUpload.addEventListener('click', () => {
            fileInput.value = '';
            fileInput.click();
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            try {
                statusEl.textContent = '🔍 Анализ документа...';
                btnUpload.disabled = true;
                btnStart.disabled = true;
                await cleanup();

                // 1. Загружаем изображение в оригинальном размере
                const img = new Image();
                const url = URL.createObjectURL(file);
                await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });

                // 2. Создаём canvas и рисуем БЕЗ сжатия
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);

                // 3. Показываем превью пользователю
                const preview = document.createElement('img');
                preview.src = file; // Браузер сам оптимизирует отображение
                preview.style.width = '100%';
                readerDiv.appendChild(preview);

                // 4. Предобработка: повышаем контраст для документов
                enhanceForBarcode(ctx, canvas.width, canvas.height);

                // 5. Декодируем напрямую с canvas
                html5QrCode = new Html5Qrcode("reader");
                const result = await html5QrCode.decode(canvas, { formatsToSupport: FORMATS });
                
                onScanSuccess(result);
                btnClear.style.display = 'block'; // Показываем только после успешного скана
                
            } catch (err) {
                console.error(err);
                statusEl.textContent = '❌ Не распознано. Сфотографируйте штрихкод крупнее или при хорошем свете.';
            } finally {
                btnUpload.disabled = false;
                btnStart.disabled = false;
            }
        });

        // === ОЧИСТКА ===
        btnClear.addEventListener('click', () => {
            resultInput.value = '';
            fileInput.value = '';
            btnClear.style.display = 'none';
            cleanup();
            statusEl.textContent = 'Готово. Загрузите новое фото.';
        });

        // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
        function onScanSuccess(text) {
            resultInput.value = text;
            statusEl.textContent = '✅ Успешно! Скопировано в буфер.';
            resultInput.select();
            navigator.clipboard?.writeText(text);
            stopCamera();
        }

        function stopCamera() {
            if (html5QrCode && cameraRunning) {
                html5QrCode.stop().then(() => {
                    cameraRunning = false;
                    btnStart.style.background = '';
                    btnStart.textContent = 'Включить камеру';
                    cleanup();
                });
            }
        }

        async function cleanup() {
            if (html5QrCode) {
                try { await html5QrCode.clear(); } catch(e) {}
            }
            readerDiv.innerHTML = '';
        }

        // 🔥 Ключевая функция для документов: повышает контраст и убирает цветовой шум
        function enhanceForBarcode(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const contrast = 1.8; // Коэффициент контраста (1.0 = без изменений)
            
            for (let i = 0; i < data.length; i += 4) {
                // Перевод в оттенки серого
                let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                // Повышение контраста
                gray = ((gray - 128) * contrast) + 128;
                // Ограничиваем 0-255
                gray = Math.max(0, Math.min(255, gray));
                
                data[i] = data[i+1] = data[i+2] = gray;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        resultInput.addEventListener('click', function() { if(this.value) this.select(); });
    </script>
</body>
</html>
