<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-сканер</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo="> 
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { margin: 0 0 1rem; font-size: 1.5rem; text-align: center; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary); }
        .btn-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        button { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 500; cursor: pointer; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #reader { width: 100%; min-height: 200px; background: #f1f5f9; border-radius: 8px; overflow: hidden; }
        /* Убираем оверлеи библиотеки — чёрный круг и прицел */
        #reader .scan-region-highlight, 
        #reader .scan-region-highlight-svg,
        #reader svg { display: none !important; }
        #reader video, #reader img { width: 100% !important; height: auto !important; object-fit: contain; display: block; }
        #status { margin-top: 0.75rem; text-align: center; color: #64748b; font-size: 0.9rem; }
        #file-input { display: none; }
        #btn-upload { background: #8b5cf6; }
        #btn-clear { background: #64748b; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 QR-сканер</h1>
        <input type="text" id="qr-result" placeholder="Результат..." autocomplete="off" readonly>
        
        <div class="btn-group">
            <button id="btn-start">Включить камеру</button>
            <button id="btn-upload">📁 Загрузить фото</button>
            <button id="btn-clear">✕ Очистить</button>
        </div>
        
        <input type="file" id="file-input" accept="image/*">
        <div id="reader"></div>
        <div id="status">Нажмите кнопку для запуска</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script>
        const resultInput = document.getElementById('qr-result');
        const btnStart = document.getElementById('btn-start');
        const btnUpload = document.getElementById('btn-upload');
        const btnClear = document.getElementById('btn-clear');
        const fileInput = document.getElementById('file-input');
        const statusEl = document.getElementById('status');
        const readerDiv = document.getElementById('reader');
        
        let scanner = null;
        let html5QrCode = null;

        // Поддерживаемые форматы: QR + штрихкоды
        const FORMATS = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39
        ];

        // === Камера ===
        btnStart.addEventListener('click', async () => {
            try {
                statusEl.textContent = 'Запрос камеры...';
                btnStart.disabled = true;
                btnUpload.disabled = true;
                
                // Очистка предыдущего сканера
                await cleanup();

                scanner = new Html5QrcodeScanner("reader", {
                    fps: 10,
                    // Убираем видимый прицел — задаём большой qrbox + скрываем через CSS
                    qrbox: { width: 400, height: 400 },
                    aspectRatio: 1.0,
                    showTorchButtonIfSupported: true,
                    formatsToSupport: FORMATS,
                    disableFlip: true,
                    // Важно: не показывать оверлей
                    rememberLastUsedCamera: true
                }, false);

                scanner.render(onSuccess, () => {});
                statusEl.textContent = 'Камера активна. Наведите на код.';
                
            } catch (err) {
                statusEl.textContent = 'Ошибка: ' + err.message;
                btnStart.disabled = false;
                btnUpload.disabled = false;
            }
        });

        // === Загрузка фото ===
        btnUpload.addEventListener('click', () => {
            // Сбрасываем значение input, чтобы можно было выбрать тот же файл повторно
            fileInput.value = '';
            fileInput.click();
        });
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                statusEl.textContent = '❌ Выберите изображение';
                return;
            }
            
            try {
                statusEl.textContent = '🔍 Сканирование...';
                btnUpload.disabled = true;
                btnStart.disabled = true;
                
                await cleanup();
                
                // Создаём сканер для файла
                html5QrCode = new Html5Qrcode("reader");
                
                // scanFile сканирует в полном разрешении исходного изображения
                const result = await html5QrCode.scanFile(file, true, {
                    formatsToSupport: FORMATS,
                    disableFlip: true
                });
                
                onSuccess(result);
                // Показываем кнопку очистки только после успешной загрузки
                btnClear.style.display = 'block';
                
            } catch (err) {
                console.error('Scan error:', err);
                statusEl.textContent = '❌ Не распознано. Проверьте качество фото.';
                resultInput.value = '';
            } finally {
                btnUpload.disabled = false;
                btnStart.disabled = false;
            }
        });

        // === Очистить (только для режима файла) ===
        btnClear.addEventListener('click', () => {
            resultInput.value = '';
            fileInput.value = '';
            btnClear.style.display = 'none';
            readerDiv.innerHTML = ''; // убираем превью изображения
            if (html5QrCode) {
                html5QrCode.clear();
                html5QrCode = null;
            }
            statusEl.textContent = 'Готово. Загрузите новое фото.';
        });

        // === Успешное сканирование ===
        function onSuccess(decodedText) {
            resultInput.value = decodedText;
            statusEl.textContent = '✅ Успешно!';
            stopScanner();
            // Авто-копирование
            resultInput.select();
            navigator.clipboard?.writeText(decodedText);
        }

        // === Остановка сканера ===
        function stopScanner() {
            if (scanner) {
                scanner.clear().catch(() => {});
                scanner = null;
            }
            btnStart.disabled = false;
            btnUpload.disabled = false;
            statusEl.textContent = 'Готово. Нажмите для нового скана.';
        }

        // === Полная очистка ресурсов ===
        async function cleanup() {
            if (scanner) {
                try { await scanner.clear(); } catch(e) {}
                scanner = null;
            }
            if (html5QrCode) {
                try { await html5QrCode.clear(); } catch(e) {}
                html5QrCode = null;
            }
            readerDiv.innerHTML = '';
        }

        // === Авто-выделение результата при клике ===
        resultInput.addEventListener('click', function() {
            if (this.value) this.select();
        });
    </script>
</body>
</html>
